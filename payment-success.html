<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status — NGOV2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #01696f;
            --success: #437a22;
            --pending: #d19900;
            --bg: #f7f6f2;
            --surface: #ffffff;
            --text: #28251d;
            --text-muted: #7a7974;
            --border: rgba(0,0,0,0.1);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .icon-wrap {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 40px;
        }
        .icon-success { background: #dcfce7; }
        .icon-pending { background: #fef9c3; }
        .icon-failed  { background: #fee2e2; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }
        .detail-box { background: var(--bg); border-radius: 8px; padding: 20px; text-align: left; margin-bottom: 28px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 14px; gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 600; text-align: right; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-pending { background: #fef9c3; color: #a16207; }
        .badge-failed  { background: #fee2e2; color: #dc2626; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px 28px; border-radius: 8px; font-weight: 600; font-size: 15px;
            text-decoration: none; border: none; cursor: pointer; width: 100%; margin-bottom: 10px;
            transition: background 0.18s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0c4e54; }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); }
        .notice {
            border-radius: 8px; padding: 12px 16px; font-size: 13px;
            margin-bottom: 24px; text-align: left;
        }
        .notice-blue   { background: #dbeafe; color: #1e40af; }
        .notice-yellow { background: #fef9c3; color: #92400e; }
        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap" id="status-icon">⏳</div>
        <h1 id="status-title">Processing...</h1>
        <p class="subtitle" id="status-subtitle"></p>
        <div class="detail-box" id="detail-box"></div>
        <div id="notice-area"></div>
        <div id="action-buttons"></div>
    </div>

    <script>
        const params   = new URLSearchParams(window.location.search);
        const txn      = params.get('txn')    || 'N/A';
        const status   = params.get('status') || 'unknown';
        const amount   = params.get('amount') || null;
        const now      = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

        async function loadDonationDetails() {
            try {
                const res  = await fetch('api/get-donation.php?txn=' + encodeURIComponent(txn));
                const data = await res.json();
                renderPage(data.success ? data.donation : null);
            } catch (e) { renderPage(null); }
        }

        function renderPage(donation) {
            const displayAmount = donation ? parseFloat(donation.amount).toFixed(2)
                                           : (amount ? parseFloat(amount).toFixed(2) : 'N/A');
            const donorName = donation ? donation.donor_name : 'Donor';
            const cause     = donation ? (donation.cause || 'General Fund') : 'General Fund';
            const taxExempt = donation ? (parseFloat(donation.amount) * 0.5).toFixed(2) : null;

            const icon    = document.getElementById('status-icon');
            const title   = document.getElementById('status-title');
            const subtitle = document.getElementById('status-subtitle');
            const detailBox = document.getElementById('detail-box');
            const noticeArea = document.getElementById('notice-area');
            const buttons = document.getElementById('action-buttons');

            const detailRows = `
                <div class="detail-row"><span class="detail-label">Transaction ID</span>
                    <span class="detail-value" style="font-family:monospace;font-size:12px">${txn}</span></div>
                <div class="detail-row"><span class="detail-label">Amount</span>
                    <span class="detail-value">₹${displayAmount}</span></div>
                <div class="detail-row"><span class="detail-label">Cause</span>
                    <span class="detail-value">${cause}</span></div>
                <div class="detail-row"><span class="detail-label">Date & Time</span>
                    <span class="detail-value">${now}</span></div>
            `;

            if (status === 'success') {
                icon.textContent = '✅'; icon.className = 'icon-wrap icon-success';
                title.textContent = 'Payment Successful!';
                subtitle.textContent = 'Thank you for your generous donation, ' + donorName + '.';
                detailBox.innerHTML = detailRows +
                    `<div class="detail-row"><span class="detail-label">Status</span>
                     <span class="detail-value"><span class="badge badge-success">✓ Confirmed</span></span></div>`;
                if (taxExempt) {
                    noticeArea.innerHTML = `<div class="notice notice-blue">
                        <strong>🧾e 80G Tax Exemption Eligible</strong><br>
                        You can claim ₹${taxExempt} as tax deduction. Your receipt will be emailed within 24 hours.</div>`;
                }
                buttons.innerHTML = `<a href="index.html" class="btn btn-primary">🏠 Back to Home</a>
                    <a href="donate.html" class="btn btn-ghost">💚 Donate Again</a>`;

            } else if (status === 'pending') {
                icon.textContent = '⏳'; icon.className = 'icon-wrap icon-pending';
                title.textContent = 'Payment Pending';
                subtitle.textContent = 'Your payment is being processed by Paytm.';
                detailBox.innerHTML = detailRows +
                    `<div class="detail-row"><span class="detail-label">Status</span>
                     <span class="detail-value"><span class="badge badge-pending">⏳ Pending</span></span></div>`;
                noticeArea.innerHTML = `<div class="notice notice-yellow">
                    ⚠️ If the amount was deducted, it will be confirmed within 24–48 hours. If not confirmed, it will be automatically refunded.</div>`;
                buttons.innerHTML = `<a href="index.html" class="btn btn-primary">🏠 Back to Home</a>`;

            } else {
                icon.textContent = '❌'; icon.className = 'icon-wrap icon-failed';
                title.textContent = 'Payment Failed';
                subtitle.textContent = 'No amount has been charged. Please try again.';
                detailBox.innerHTML = detailRows +
                    `<div class="detail-row"><span class="detail-label">Status</span>
                     <span class="detail-value"><span class="badge badge-failed">✗ Failed</span></span></div>`;
                buttons.innerHTML = `<a href="donate.html" class="btn btn-primary">↩ Try Again</a>
                    <a href="index.html" class="btn btn-ghost">🏠 Back to Home</a>`;
            }
        }

        loadDonationDetails();
    </script>
</body>
</html>
