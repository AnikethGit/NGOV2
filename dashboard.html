<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Sri Dutta Sai Manga Bharadwaja</title>
    <link rel="icon" href="images/LogoNGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/theme-compatibility.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #21808d;
            --primary-dark: #1a6975;
            --success: #16a34a;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter','Poppins',sans-serif; background:var(--bg); color:var(--text); }

        /* Top Bar */
        .dash-header {
            background:var(--surface);
            border-bottom:1px solid var(--border);
            padding:0 24px;
            height:64px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            position:sticky;
            top:0;
            z-index:100;
            box-shadow:0 1px 3px rgba(0,0,0,.06);
        }
        .dash-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .dash-brand img { width:36px; height:36px; object-fit:contain; }
        .dash-brand span { font-weight:700; font-size:15px; color:var(--primary); }
        .dash-user { display:flex; align-items:center; gap:12px; }
        .dash-user-name { font-weight:600; font-size:14px; }
        .btn-logout {
            background:none;
            border:1px solid var(--border);
            padding:7px 16px;
            border-radius:8px;
            font-size:13px;
            font-weight:500;
            cursor:pointer;
            color:var(--text-muted);
            transition:all .2s;
        }
        .btn-logout:hover { background:#fee2e2; color:#dc2626; border-color:#fecaca; }

        /* Layout */
        .dash-layout { display:flex; min-height:calc(100vh - 64px); }

        /* Sidebar */
        .dash-sidebar {
            width:220px;
            background:var(--surface);
            border-right:1px solid var(--border);
            padding:24px 0;
            flex-shrink:0;
        }
        .sidebar-nav a {
            display:flex;
            align-items:center;
            gap:10px;
            padding:11px 24px;
            color:var(--text-muted);
            text-decoration:none;
            font-size:14px;
            font-weight:500;
            transition:all .15s;
            border-left:3px solid transparent;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color:var(--primary);
            background:#f0fafa;
            border-left-color:var(--primary);
        }
        .sidebar-nav a i { width:18px; text-align:center; }
        .sidebar-section {
            font-size:11px;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.08em;
            color:var(--text-muted);
            padding:18px 24px 6px;
        }

        /* Main content */
        .dash-main { flex:1; padding:32px; overflow-y:auto; }
        .dash-greeting { margin-bottom:28px; }
        .dash-greeting h1 { font-size:24px; font-weight:700; }
        .dash-greeting p  { color:var(--text-muted); font-size:14px; margin-top:4px; }

        /* KPI cards */
        .kpi-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
            gap:20px;
            margin-bottom:32px;
        }
        .kpi-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:22px;
            display:flex;
            align-items:center;
            gap:16px;
        }
        .kpi-icon {
            width:48px; height:48px;
            border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-size:20px;
            flex-shrink:0;
        }
        .kpi-icon.teal   { background:#e0f2f1; color:#00796b; }
        .kpi-icon.green  { background:#dcfce7; color:#16a34a; }
        .kpi-icon.orange { background:#fff7ed; color:#ea580c; }
        .kpi-icon.blue   { background:#dbeafe; color:#2563eb; }
        .kpi-value  { font-size:22px; font-weight:700; }
        .kpi-label  { font-size:12px; color:var(--text-muted); margin-top:2px; }

        /* Donation table */
        .card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            overflow:hidden;
            margin-bottom:24px;
        }
        .card-header {
            padding:18px 22px;
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        .card-header h2 { font-size:16px; font-weight:600; }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th {
            text-align:left;
            padding:11px 16px;
            font-size:12px;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:.05em;
            color:var(--text-muted);
            background:#f8fafc;
            border-bottom:1px solid var(--border);
        }
        td { padding:13px 16px; border-bottom:1px solid var(--border); }
        tr:last-child td { border-bottom:none; }
        .badge {
            display:inline-flex;
            align-items:center;
            padding:3px 10px;
            border-radius:999px;
            font-size:12px;
            font-weight:600;
        }
        .badge-success { background:#dcfce7; color:#15803d; }
        .badge-pending { background:#fef9c3; color:#854d0e; }
        .badge-failed  { background:#fee2e2; color:#b91c1c; }

        /* Empty state */
        .empty-state {
            text-align:center;
            padding:48px 24px;
            color:var(--text-muted);
        }
        .empty-state i  { font-size:40px; margin-bottom:12px; opacity:.4; }
        .empty-state h3 { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }
        .empty-state p  { font-size:14px; }
        .empty-state a  {
            display:inline-block;
            margin-top:16px;
            background:var(--primary);
            color:#fff;
            padding:10px 22px;
            border-radius:8px;
            text-decoration:none;
            font-weight:600;
            font-size:14px;
        }

        /* Responsive */
        @media (max-width:768px) {
            .dash-sidebar { display:none; }
            .dash-main { padding:20px; }
            .kpi-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="dash-header">
    <a href="index.html" class="dash-brand">
        <img src="images/LogoNGO.png" alt="Logo">
        <span>Sai Seva Foundation</span>
    </a>
    <div class="dash-user">
        <span class="dash-user-name" id="userName">Loading...</span>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar">
        <nav class="sidebar-nav">
            <div class="sidebar-section">Main</div>
            <a href="dashboard.html" class="active"><i class="fas fa-home"></i> Overview</a>
            <a href="donate.html"><i class="fas fa-heart"></i> Donate</a>
            <div class="sidebar-section">History</div>
            <a href="#donations"><i class="fas fa-receipt"></i> My Donations</a>
            <a href="#certificates"><i class="fas fa-certificate"></i> Certificates</a>
            <div class="sidebar-section">Account</div>
            <a href="#profile"><i class="fas fa-user"></i> Profile</a>
            <a href="#settings"><i class="fas fa-cog"></i> Settings</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="dash-main">
        <div class="dash-greeting">
            <h1>Welcome back, <span id="greetName">Donor</span> 👋</h1>
            <p id="greetDate">Loading date...</p>
        </div>

        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-icon teal"><i class="fas fa-rupee-sign"></i></div>
                <div>
                    <div class="kpi-value" id="totalDonated">₹0</div>
                    <div class="kpi-label">Total Donated</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon green"><i class="fas fa-check-circle"></i></div>
                <div>
                    <div class="kpi-value" id="successCount">0</div>
                    <div class="kpi-label">Successful</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon orange"><i class="fas fa-clock"></i></div>
                <div>
                    <div class="kpi-value" id="pendingCount">0</div>
                    <div class="kpi-label">Pending</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon blue"><i class="fas fa-calendar"></i></div>
                <div>
                    <div class="kpi-value" id="lastDate">—</div>
                    <div class="kpi-label">Last Donation</div>
                </div>
            </div>
        </div>

        <!-- Donations Table -->
        <div class="card" id="donations">
            <div class="card-header">
                <h2><i class="fas fa-receipt" style="color:var(--primary);margin-right:8px"></i>My Donations</h2>
                <a href="donate.html" style="background:var(--primary);color:#fff;padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600">
                    <i class="fas fa-plus"></i> New Donation
                </a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Project</th>
                            <th>Transaction ID</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="donationTableBody">
                        <!-- filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Check auth
    const token = sessionStorage.getItem('auth_token') || localStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('user_data') || localStorage.getItem('user_data') || 'null');

    if (!token || !user) {
        window.location.href = 'login.html';
        return;
    }

    // Greet
    document.getElementById('userName').textContent  = user.name || user.email;
    document.getElementById('greetName').textContent = (user.name || 'Donor').split(' ')[0];
    document.getElementById('greetDate').textContent =
        new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // Load donations
    loadDonations(token);
});

async function loadDonations(token) {
    const tbody = document.getElementById('donationTableBody');
    try {
        const res  = await fetch('api/donations.php?action=my_donations', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (data.success && data.donations.length) {
            let total = 0, success = 0, pending = 0, lastDate = null;
            tbody.innerHTML = data.donations.map(d => {
                total   += parseFloat(d.amount) || 0;
                if (d.status === 'success')  success++;
                if (d.status === 'pending')  pending++;
                if (!lastDate || new Date(d.created_at) > new Date(lastDate)) lastDate = d.created_at;
                const badge = d.status === 'success' ? 'badge-success' :
                              d.status === 'pending'  ? 'badge-pending'  : 'badge-failed';
                return `<tr>
                    <td>${new Date(d.created_at).toLocaleDateString('en-IN')}</td>
                    <td><strong>&#8377;${parseFloat(d.amount).toLocaleString('en-IN')}</strong></td>
                    <td>${d.project_name || d.campaign_id || '—'}</td>
                    <td style="font-family:monospace;font-size:12px">${d.transaction_id || '—'}</td>
                    <td><span class="badge ${badge}">${d.status}</span></td>
                </tr>`;
            }).join('');
            document.getElementById('totalDonated').textContent = '&#8377;' + total.toLocaleString('en-IN');
            document.getElementById('successCount').textContent = success;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('lastDate').textContent     = lastDate
                ? new Date(lastDate).toLocaleDateString('en-IN', {day:'numeric',month:'short'})
                : '—';
        } else {
            tbody.innerHTML = `<tr><td colspan="5">
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>No donations yet</h3>
                    <p>Your donation history will appear here.</p>
                    <a href="donate.html">Make your first donation</a>
                </div>
            </td></tr>`;
        }
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:#dc2626">
            Could not load donations. Please refresh.
        </td></tr>`;
    }
}

function logout() {
    sessionStorage.clear();
    localStorage.removeItem('auth_token');
    localStorage.removeItem('user_data');
    window.location.href = 'login.html';
}
</script>
    <script src="js/theme-switcher.js"></script>
</body>
</html>
