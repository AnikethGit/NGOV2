<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - NGOV2</title>
    <link rel="icon" href="images/LogoNGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/common.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #21808d;
            --success: #16a34a;
            --error: #dc2626;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 4px 24px rgba(0,0,0,.07);
        }
        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px;
            transition: border .2s;
            background: var(--bg);
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(33,128,141,.12); }

        .btn-submit {
            width: 100%; padding: 13px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s;
            margin-top: 6px;
        }
        .btn-submit:hover { background: #1a6975; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

        .result-box {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .result-box.success { background: #dcfce7; border-left: 4px solid var(--success); color: #15803d; }
        .result-box.error   { background: #fee2e2; border-left: 4px solid var(--error);   color: #b91c1c; }
        .result-box.info    { background: #dbeafe; border-left: 4px solid var(--primary);  color: #1e3a8a; }

        .result-box pre {
            background: rgba(0,0,0,.06);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin-top: 10px;
            font-size: 12px;
            line-height: 1.5;
        }

        .test-section {
            border-top: 1px solid var(--border);
            margin-top: 28px;
            padding-top: 20px;
        }
        .test-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

        .test-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 7px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            border: 1px solid var(--border); background: none;
            color: var(--text); transition: all .2s; margin: 4px;
        }
        .test-btn:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title"><i class="fas fa-flask" style="color:var(--primary);margin-right:8px"></i>Login API Test</div>
        <div class="card-sub">Test the authentication endpoint directly</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" value="admin@ngov2.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" value="Admin@123">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Test Login</button>
        </form>

        <div class="result-box" id="resultBox"></div>

        <div class="test-section">
            <h3>Quick Tests</h3>
            <button class="test-btn" onclick="testEndpoint('api/auth.php?action=check')"><i class="fas fa-heartbeat"></i> API Health</button>
            <button class="test-btn" onclick="testEndpoint('api/config.php?action=test')"><i class="fas fa-database"></i> DB Config</button>
            <button class="test-btn" onclick="fillAdmin()"><i class="fas fa-user-shield"></i> Fill Admin</button>
            <button class="test-btn" onclick="clearResult()"><i class="fas fa-eraser"></i> Clear</button>
        </div>
    </div>

<script>
const form      = document.getElementById('loginForm');
const resultBox = document.getElementById('resultBox');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showResult('Please fill in both fields.', 'error');

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Testing…';

    try {
        const res  = await fetch('api/auth.php?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const text = await res.text();
        let data;
        try   { data = JSON.parse(text); }
        catch  { return showResult('Non-JSON response:<pre>' + escHtml(text) + '</pre>', 'error'); }

        if (data.success) {
            sessionStorage.setItem('auth_token', data.token);
            sessionStorage.setItem('user_data',  JSON.stringify(data.user));
            showResult('✅ Login successful! Token saved to sessionStorage.<pre>' + escHtml(JSON.stringify(data, null, 2)) + '</pre>', 'success');
        } else {
            showResult('❌ Login failed: ' + (data.message || 'Unknown error') + '<pre>' + escHtml(JSON.stringify(data, null, 2)) + '</pre>', 'error');
        }
    } catch(err) {
        showResult('Network error: ' + err.message, 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Test Login';
    }
});

async function testEndpoint(url) {
    showResult('<span class="spinner" style="border-top-color:var(--primary)"></span> Calling ' + url + '…', 'info');
    try {
        const res  = await fetch(url);
        const text = await res.text();
        let pretty;
        try   { pretty = JSON.stringify(JSON.parse(text), null, 2); }
        catch  { pretty = text; }
        showResult('📡 Response from <code>' + url + '</code>:<pre>' + escHtml(pretty) + '</pre>', 'info');
    } catch(e) {
        showResult('Error: ' + e.message, 'error');
    }
}

function fillAdmin() {
    document.getElementById('email').value    = 'admin@ngov2.com';
    document.getElementById('password').value = 'Admin@123';
}
function clearResult() {
    resultBox.style.display = 'none';
    resultBox.innerHTML = '';
}
function showResult(html, type) {
    resultBox.className = 'result-box ' + type;
    resultBox.innerHTML = html;
    resultBox.style.display = 'block';
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
    <script src="js/theme-switcher.js"></script>
</body>
</html>
