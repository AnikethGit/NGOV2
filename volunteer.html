<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer - Sri Datta Sai Manga Bharadwaja Trust</title>
    <link rel="icon" href="images/LogoNGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme-compatibility.css">
    <!-- Google Fonts: preconnect + font-display=swap to avoid invisible text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"></noscript>

    <!-- Font Awesome: load asynchronously — icons are non-critical -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" crossorigin="anonymous">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous"></noscript>
    <style>
        .coming-soon-section { min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 1rem; }
        .coming-soon-section .icon { font-size: 4rem; color: var(--primary, #e67e22); margin-bottom: 1.5rem; }
        .coming-soon-section h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .coming-soon-section p { font-size: 1.1rem; color: var(--text-secondary, #666); max-width: 500px; margin: 0 auto 2rem; }
    </style>
</head>
<body>
    <div id="global-header"></div>

    <main>
        <section class="coming-soon-section">
            <div class="container">
                <div class="icon"><i class="fas fa-hands-helping"></i></div>
                <h1>Volunteer With Us</h1>
                <p>We welcome volunteers to join our mission. Volunteer registration is coming soon.</p>
                <a href="index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/theme-switcher.js"></script>
</body>
</html>
