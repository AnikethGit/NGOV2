<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard - Sri Dutta Sai Manga Bharadwaja</title>
    <link rel="icon" href="images/LogoNGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/theme-compatibility.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #21808d;
            --primary-dark: #1a6975;
            --success: #16a34a;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter','Poppins',sans-serif; background:var(--bg); color:var(--text); }

        .dash-header {
            background:var(--surface);
            border-bottom:1px solid var(--border);
            padding:0 24px;
            height:64px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            position:sticky;
            top:0;
            z-index:100;
            box-shadow:0 1px 3px rgba(0,0,0,.06);
        }
        .dash-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .dash-brand img { width:36px; height:36px; object-fit:contain; }
        .dash-brand span { font-weight:700; font-size:15px; color:var(--primary); }
        .dash-user { display:flex; align-items:center; gap:12px; }
        .dash-user-name { font-weight:600; font-size:14px; }
        .btn-logout {
            background:none; border:1px solid var(--border);
            padding:7px 16px; border-radius:8px;
            font-size:13px; font-weight:500; cursor:pointer;
            color:var(--text-muted); transition:all .2s;
        }
        .btn-logout:hover { background:#fee2e2; color:#dc2626; border-color:#fecaca; }

        .dash-layout { display:flex; min-height:calc(100vh - 64px); }

        .dash-sidebar {
            width:220px; background:var(--surface);
            border-right:1px solid var(--border);
            padding:24px 0; flex-shrink:0;
        }
        .sidebar-nav a {
            display:flex; align-items:center; gap:10px;
            padding:11px 24px; color:var(--text-muted);
            text-decoration:none; font-size:14px; font-weight:500;
            transition:all .15s; border-left:3px solid transparent;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color:var(--primary); background:#f0fafa; border-left-color:var(--primary);
        }
        .sidebar-nav a i { width:18px; text-align:center; }
        .sidebar-section {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:.08em; color:var(--text-muted); padding:18px 24px 6px;
        }

        .dash-main { flex:1; padding:32px; overflow-y:auto; }
        .dash-greeting { margin-bottom:28px; }
        .dash-greeting h1 { font-size:24px; font-weight:700; }
        .dash-greeting p  { color:var(--text-muted); font-size:14px; margin-top:4px; }

        .kpi-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:20px; margin-bottom:32px;
        }
        .kpi-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:22px;
            display:flex; align-items:center; gap:16px;
        }
        .kpi-icon {
            width:48px; height:48px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
        }
        .kpi-icon.teal   { background:#e0f2f1; color:#00796b; }
        .kpi-icon.green  { background:#dcfce7; color:#16a34a; }
        .kpi-icon.blue   { background:#dbeafe; color:#2563eb; }
        .kpi-icon.purple { background:#f3e8ff; color:#7c3aed; }
        .kpi-value { font-size:22px; font-weight:700; }
        .kpi-label { font-size:12px; color:var(--text-muted); margin-top:2px; }

        .card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); overflow:hidden; margin-bottom:24px;
        }
        .card-header {
            padding:18px 22px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
        }
        .card-header h2 { font-size:16px; font-weight:600; }
        .card-body { padding:22px; }

        .task-list { list-style:none; }
        .task-item {
            display:flex; align-items:flex-start; gap:14px;
            padding:14px 0; border-bottom:1px solid var(--border);
            font-size:14px;
        }
        .task-item:last-child { border-bottom:none; }
        .task-status {
            width:8px; height:8px; border-radius:50%;
            margin-top:5px; flex-shrink:0;
        }
        .task-status.done    { background:var(--success); }
        .task-status.pending { background:#f59e0b; }
        .task-status.new     { background:var(--primary); }
        .task-title  { font-weight:600; margin-bottom:2px; }
        .task-detail { color:var(--text-muted); font-size:13px; }

        .badge {
            display:inline-flex; align-items:center;
            padding:3px 10px; border-radius:999px;
            font-size:12px; font-weight:600;
        }
        .badge-success { background:#dcfce7; color:#15803d; }
        .badge-pending { background:#fef9c3; color:#854d0e; }
        .badge-new     { background:#dbeafe; color:#1e40af; }

        .profile-card {
            display:flex; align-items:center; gap:20px;
            padding:22px; background:var(--surface);
            border:1px solid var(--border); border-radius:var(--radius);
            margin-bottom:24px;
        }
        .avatar {
            width:64px; height:64px; border-radius:50%;
            background:linear-gradient(135deg,var(--primary),#1a6975);
            display:flex; align-items:center; justify-content:center;
            font-size:24px; color:#fff; font-weight:700; flex-shrink:0;
        }
        .profile-name  { font-size:18px; font-weight:700; }
        .profile-role  { font-size:13px; color:var(--text-muted); margin-top:2px; }
        .profile-badge {
            margin-top:6px; display:inline-flex; align-items:center; gap:6px;
            background:#e0f2f1; color:var(--primary);
            padding:4px 12px; border-radius:999px; font-size:13px; font-weight:600;
        }

        @media (max-width:768px) {
            .dash-sidebar { display:none; }
            .dash-main { padding:20px; }
            .kpi-grid { grid-template-columns:1fr 1fr; }
            .profile-card { flex-direction:column; text-align:center; }
        }
    </style>
</head>
<body>

<header class="dash-header">
    <a href="index.html" class="dash-brand">
        <img src="images/LogoNGO.png" alt="Logo">
        <span>Sai Seva Foundation</span>
    </a>
    <div class="dash-user">
        <span class="dash-user-name" id="userName">Loading...</span>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<div class="dash-layout">
    <aside class="dash-sidebar">
        <nav class="sidebar-nav">
            <div class="sidebar-section">Volunteer</div>
            <a href="volunteer-dashboard.html" class="active"><i class="fas fa-home"></i> Overview</a>
            <a href="#tasks"><i class="fas fa-tasks"></i> My Tasks</a>
            <a href="#schedule"><i class="fas fa-calendar"></i> Schedule</a>
            <div class="sidebar-section">Organisation</div>
            <a href="services.html"><i class="fas fa-hands-helping"></i> Projects</a>
            <a href="about.html"><i class="fas fa-info-circle"></i> About Trust</a>
            <div class="sidebar-section">Account</div>
            <a href="#profile"><i class="fas fa-user"></i> My Profile</a>
        </nav>
    </aside>

    <main class="dash-main">
        <div class="profile-card" id="profile">
            <div class="avatar" id="avatarInitial">V</div>
            <div>
                <div class="profile-name" id="profileName">Volunteer</div>
                <div class="profile-role" id="profileEmail">volunteer@example.com</div>
                <div class="profile-badge"><i class="fas fa-star"></i> Active Volunteer</div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-icon teal"><i class="fas fa-clock"></i></div>
                <div><div class="kpi-value">—</div><div class="kpi-label">Hours Volunteered</div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon green"><i class="fas fa-check-circle"></i></div>
                <div><div class="kpi-value">—</div><div class="kpi-label">Tasks Completed</div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon blue"><i class="fas fa-calendar-check"></i></div>
                <div><div class="kpi-value">—</div><div class="kpi-label">Events Attended</div></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon purple"><i class="fas fa-medal"></i></div>
                <div><div class="kpi-value">—</div><div class="kpi-label">Recognition Points</div></div>
            </div>
        </div>

        <div class="card" id="tasks">
            <div class="card-header">
                <h2><i class="fas fa-tasks" style="color:var(--primary);margin-right:8px"></i>My Tasks</h2>
            </div>
            <div class="card-body">
                <ul class="task-list">
                    <!-- Filled by JS from api/volunteer-tasks.php -->
                </ul>
            </div>
        </div>
    </main>
</div>

<script src="js/main.js"></script>
<script>
function logout() {
    sessionStorage.clear();
    localStorage.removeItem('auth_token');
    localStorage.removeItem('user_data');
    window.location.href = 'login.html';
}
</script>
<script src="js/volunteer-dashboard.js"></script>
<script src="js/theme-switcher.js"></script>
</body>
</html>
